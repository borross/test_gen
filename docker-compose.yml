# TestGen v2.2 — запуск через Docker Compose
#
#   docker compose up -d        # собрать и запустить
#   docker compose logs -f      # логи
#   docker compose down         # остановить и удалить
#
# Порт и привязку можно переопределить переменными окружения:
#   TESTGEN_PORT=9000 docker compose up -d
#   TESTGEN_BIND=127.0.0.1 docker compose up -d   # доступ только с этой машины

services:
  testgen:
    build: .
    image: testgen:2.3
    container_name: testgen
    # По умолчанию доступен из вашей сети: http://<IP-машины>:8000
    ports:
      - "${TESTGEN_BIND:-0.0.0.0}:${TESTGEN_PORT:-8000}:8000"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
